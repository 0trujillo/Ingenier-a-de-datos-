version: "3.8"

services:

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin123}
    ports:
      - "9000:9000"
      - "9001:9001"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9092"]
      interval: 10s
      timeout: 5s
      retries: 20

  datadog:
    image: datadog/agent:latest
    env_file:
      - .env
    environment:
      DD_API_KEY: ${DD_API_KEY:-}
      DD_SITE: ${DD_SITE:-us5.datadoghq.com}
      DD_LOGS_ENABLED: "true"
      DD_APM_ENABLED: "true"
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
      DD_BIND_HOST: "0.0.0.0"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
    ports:
      - "8125:8125/udp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-sensores}
      LATITUDE: ${LATITUDE:--33.45}
      LONGITUDE: ${LONGITUDE:--70.66}
      POLL_SECONDS: ${POLL_SECONDS:-300}
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-admin123}

  sensor-producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_TOPIC_SENSORS: ${KAFKA_TOPIC_SENSORS:-sensores-iot}
      POLL_SECONDS: ${POLL_SECONDS_SENSORS:-60}
    command: ["python", "producer/sensor-simulator.py"]

  video-producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_TOPIC_VIDEO: ${KAFKA_TOPIC_VIDEO:-video-stream}
      POLL_SECONDS: ${POLL_SECONDS_VIDEO:-30}
    command: ["python", "producer/video-simulator.py"]

  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    depends_on:
      - kafka
      - datadog
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      DATADOG_HOST: ${DATADOG_HOST:-datadog}
      DATADOG_PORT: ${DATADOG_PORT:-8125}
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-admin123}

  ml-api:
    build:
      context: .
      dockerfile: ml-api/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - minio
    environment:
      MODEL_PATH: ${MODEL_PATH:-model.pkl}
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-admin123}

  silver:
    build:
      context: .
      dockerfile: lake/plata/Dockerfile
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-admin123}
      BRONZE_BUCKET: ${BRONZE_BUCKET:-bronze}
      PLATA_BUCKET: ${PLATA_BUCKET:-plata}
      PROCESSED_BUCKET: ${PLATA_PROCESSED_BUCKET:-plata-processed}

  gold:
    build:
      context: .
      dockerfile: lake/oro/Dockerfile
    depends_on:
      - minio
      - ml-api
    environment:
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-admin123}
      PLATA_BUCKET: ${PLATA_BUCKET:-plata}
      ORO_BUCKET: ${ORO_BUCKET:-oro}
      PROCESSED_BUCKET: ${ORO_PROCESSED_BUCKET:-oro-processed}
      MODEL_API_URL: ${MODEL_API_URL:-http://ml-api:8000/predict}

  event-aggregator:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-sensores}
      KAFKA_TOPIC_SENSORS: ${KAFKA_TOPIC_SENSORS:-sensores-iot}
      KAFKA_TOPIC_VIDEO: ${KAFKA_TOPIC_VIDEO:-video-stream}
      KAFKA_AGGREGATED_TOPIC: ${KAFKA_AGGREGATED_TOPIC:-aggregated-events}
    command: ["python", "consumer/event_aggregator.py"]

  analytics-loader:
    build:
      context: .
      dockerfile: lake/Dockerfile
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-admin123}
      ORO_BUCKET: ${ORO_BUCKET:-oro}
      ANALYTICS_BUCKET: ${ANALYTICS_BUCKET:-analytics-processed}
      DUCKDB_PATH: ${DUCKDB_PATH:-/data/analytics.duckdb}
    volumes:
      - analytics_data:/data
    command: ["python", "lake/analytics/loader.py"]

volumes:
  analytics_data:
